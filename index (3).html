/* ============================================================
   LEAVE REQUEST AUTO-REPORT — HCIS PT Tri Adi Bersama (Anteraja)
   Standalone website build (for GitHub Pages) — no bundler needed.
   Data source : a Google Sheet, published to the web as CSV.
   Libraries   : React, ReactDOM, Babel, PapaParse, JSZip, jsPDF, SheetJS
                 all loaded via <script> tags in index.html.
   ============================================================ */

const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ---------- CONFIG ----------
   Data source: "Report Tasklist General" tab, published to web as CSV
   (File → Share → Publish to web). Columns match the HCaja export format
   exactly, incl. "Status Pegawai" — no restructuring needed. */
const GOOGLE_SHEET_CSV_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_Pwjr5RMgDezTUZkTsUyyulv_xaGn_EezSaxJKbanBK_bTJ0A_A6MAe0zy7WRiZRCn45zxnVZzfKz/pub?gid=1245458826&single=true&output=csv";

/* ---------- fetch + parse the published Google Sheet ---------- */
async function fetchSheetRows(url) {
  // "cache: no-store" only stops the *browser* from caching. Google's publish-to-web
  // CSV endpoint also sits behind Google's own edge cache, which can serve a stale
  // snapshot for a few minutes regardless of browser headers — and can do so
  // inconsistently (different edge nodes hold different snapshots). Appending a
  // unique query param on every call forces Google to treat each refresh as a
  // distinct URL, which reliably bypasses that edge cache too.
  const bustedUrl = url + (url.includes("?") ? "&" : "?") + "cb=" + Date.now();
  const res = await fetch(bustedUrl, { cache: "no-store" });
  if (!res.ok) throw new Error(`HTTP ${res.status} saat mengambil data dari Google Sheets`);
  const csvText = await res.text();
  const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
  if (parsed.errors && parsed.errors.length) {
    console.warn("CSV parse warnings:", parsed.errors.slice(0, 3));
  }
  return parsed.data;
}

/* ---------- shared raw-row → report-row mapping ----------
   Used both for the automatic Google Sheets fetch and for the manual
   "upload file" fallback, so the derivation logic only lives in one place. */
function processRawRows(raw) {
  const data = raw
    .filter((r) => r["Register No"])
    .map((r) => ({
      ...r,
      "Type": r["Type"] || deriveType(r["Summary Task"]),
      "Status Pegawai (Clean)":
        r["Status Pegawai (Clean)"] || deriveStatusPegawai(r["Status Pegawai"] ?? r["Status pegawai"]),
      "Region": r["Region"] || deriveRegion(r["Requestor Location Group"] || r["Requestor Location Name"]),
      _date: parseDMY(r["Submit Date"]) || parseDMY(r["Submit Date (Date)"]),
      _hour:
        r["Process Hour (Number)"] != null && isFinite(+r["Process Hour (Number)"])
          ? +r["Process Hour (Number)"]
          : r["Process Hour"] != null && isFinite(+r["Process Hour"])
          ? +r["Process Hour"]
          : null,
    }));
  return data;
}

function deriveType(summaryTask) {
  if (!summaryTask) return "CUTI KHUSUS";
  const s = String(summaryTask).toUpperCase();
  if (s.includes("DAY OFF") || s.includes("DAYOFF")) return "DAY OFF";
  if (s.includes("ANNUAL LEAVE")) return "ANNUAL LEAVE";
  if (s.includes("BIG LEAVE")) return "BIG LEAVE";
  if (s.includes("SUBMISSION  FOR") || s.includes("SUBMISSION FOR")) return "CUTI";
  return "CUTI KHUSUS";
}

/* Status Pegawai: =IFS(AA2="TETAP";"TETAP";SEARCH("OUTSOURCE");"OUTSOURCE";TRUE;TEXTBEFORE(AA2;" ")) */
function deriveStatusPegawai(raw) {
  if (raw == null || raw === "") return null;
  const s = String(raw).trim();
  if (s === "TETAP") return "TETAP";
  if (s.toUpperCase().includes("OUTSOURCE")) return "OUTSOURCE";
  const i = s.indexOf(" ");
  return i > 0 ? s.slice(0, i) : s;
}

/* Region: mapping otomatis dari Requestor Location Group / Location Name */
function deriveRegion(loc) {
  if (!loc) return "CEK ULANG";
  const s = String(loc).toUpperCase();
  if (s.includes("JABODETABEK") || s.includes("SFI-KANTOR WAREHOUSE") || s.includes("ASL-DKI JAKARTA") || s.includes("ASL-BANTEN")) return "JABODETABEK";
  if (s.includes("SFI-KANTOR PUSAT") || s.includes("KGA-KANTOR PUSAT") || s.includes("HO-KANTOR PUSAT")) return "HEAD OFFICE";
  if (s.includes("KGA-WAREHOUSE")) return "WAREHOUSE";
  if (s.includes("ASL-SULAWESI")) return "ASL-SULAWESI";
  if (s.includes("ASL-KALIMANTAN") || s.includes("SULAWESI-") || s.includes("MALUKU-") || s.includes("PAPUA-") || s.includes("KALIMANTAN-")) return "KALSULAMPAPUA";
  if (s.includes("ASL-SUMATERA") || s.includes("SUMATERA-")) return "SUMATERA";
  if (s.includes("ASL-JAWA TENGAH") || s.includes("JATENG DIY-")) return "JATENG DIY";
  if (s.includes("ASL-JAWA TIMUR") || s.includes("JATIM-") || s.includes("BALI-") || s.includes("NUSRA-")) return "JATIM BALI NUSRA";
  if (s.includes("ASL-JAWA BARAT") || s.includes("JABAR-")) return "JABAR";
  return "CEK ULANG";
}

/* ---------- parsing helpers ---------- */
const parseDMY = (s) => {
  if (s == null) return null;
  if (s instanceof Date && !isNaN(s)) return s;
  if (typeof s === "number") {
    const d = new Date(Math.round((s - 25569) * 86400 * 1000));
    return isNaN(d) ? null : d;
  }
  const str = String(s).trim();
  const m = str.match(/^(\d{1,2})-(\d{1,2})-(\d{4})/);
  if (m) return new Date(+m[3], +m[2] - 1, +m[1]);
  const d = new Date(str);
  return isNaN(d) ? null : d;
};

const fmtDate = (d) =>
  d ? d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) : "—";
const fmtDateTime = (d) =>
  d
    ? d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) +
      ", " +
      d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", hour12: false }) +
      " WIB"
    : "—";
const toInputDate = (d) => {
  if (!d) return "";
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
};
const pct = (x) => (x == null ? "\u2014" : (x * 100).toFixed(2).replace(".", ",") + "%");
const num = (x) => (x == null ? "—" : Number(x).toLocaleString("en-US"));

/* ---------- aggregation (optimized single-pass) ---------- */
function buildReport(rows, start, end) {
  const inPeriod = rows.filter((r) => r._date && r._date >= start && r._date <= end);
  const total = inPeriod.length;
  
  // Single pass aggregation to avoid O(n²) complexity
  const agg = {
    approved: 0, rejected: 0, waiting: 0, cancelled: 0,
    companies: new Map(), types: new Map(), regions: new Map(),
    empStatus: new Map(), levels: new Map(), approvals: new Map(),
    locations: new Map(), approvers: new Map(),
    hours: [], statusCounts: {}
  };
  
  inPeriod.forEach((r) => {
    // Status counts
    const status = r.Status;
    if (status === "Approved") agg.approved++;
    else if (status === "Reject") agg.rejected++;
    else if (status === "Waiting Approval") agg.waiting++;
    else if (status === "Cancelled") agg.cancelled++;
    
    // By Company
    const comp = r.Company || "(blank)";
    agg.companies.set(comp, (agg.companies.get(comp) || { n: 0, ap: 0, rj: 0, wt: 0, hrs: [] }));
    const c = agg.companies.get(comp);
    c.n++; if (status === "Approved") c.ap++; else if (status === "Reject") c.rj++; else if (status === "Waiting Approval") c.wt++;
    if (r._hour != null) c.hrs.push(r._hour);
    
    // By Type
    const typ = r.Type || "(blank)";
    agg.types.set(typ, (agg.types.get(typ) || 0) + 1);
    
    // By Region
    const reg = r.Region || "(blank)";
    agg.regions.set(reg, (agg.regions.get(reg) || { n: 0, ap: 0, rj: 0 }));
    const rg = agg.regions.get(reg);
    rg.n++; if (status === "Approved") rg.ap++; else if (status === "Reject") rg.rj++;
    
    // By Employment Status
    const emp = r["Status Pegawai (Clean)"] || "(blank)";
    agg.empStatus.set(emp, (agg.empStatus.get(emp) || { n: 0, rj: 0 }));
    const e = agg.empStatus.get(emp);
    e.n++; if (status === "Reject") e.rj++;
    
    // By Level
    const lv = r["Requestor Level Code"] || "(blank)";
    agg.levels.set(lv, (agg.levels.get(lv) || { n: 0, rj: 0 }));
    const l = agg.levels.get(lv);
    l.n++; if (status === "Reject") l.rj++;
    
    // By Approval Type
    const app = r["Approval Type"] || "(blank)";
    agg.approvals.set(app, (agg.approvals.get(app) || { n: 0, ap: 0, rj: 0, wt: 0 }));
    const a = agg.approvals.get(app);
    a.n++; if (status === "Approved") a.ap++; else if (status === "Reject") a.rj++; else if (status === "Waiting Approval") a.wt++;
    
    // Locations & Approvers
    const loc = r["Requestor Location Name"];
    if (loc && loc !== "(blank)") agg.locations.set(loc, (agg.locations.get(loc) || 0) + 1);
    
    const apr = r["Last State Name"];
    if (apr && apr !== "(blank)") agg.approvers.set(apr, (agg.approvers.get(apr) || 0) + 1);
    
    if (r._hour != null && isFinite(r._hour)) agg.hours.push(r._hour);
  });
  
  // Convert maps to arrays
  const companies = [...agg.companies.entries()]
    .map(([k, v]) => ({
      name: k, n: v.n, approved: v.ap, rejected: v.rj, waiting: v.wt,
      rate: v.n ? v.ap / v.n : 0,
      avgHour: v.hrs.length ? v.hrs.reduce((a, b) => a + b, 0) / v.hrs.length : null,
    }))
    .sort((a, b) => b.n - a.n);

  const types = [...agg.types.entries()]
    .map(([k, n]) => ({ name: k, n, share: total ? n / total : 0 }))
    .sort((a, b) => b.n - a.n);

  const regions = [...agg.regions.entries()]
    .map(([k, v]) => ({ name: k, n: v.n, approved: v.ap, rejected: v.rj, rate: v.n ? v.ap / v.n : 0 }))
    .sort((a, b) => b.n - a.n);

  const empStatus = [...agg.empStatus.entries()]
    .map(([k, v]) => ({ name: k, n: v.n, rejected: v.rj, rejRate: v.n ? v.rj / v.n : 0 }))
    .sort((a, b) => b.n - a.n);

  const levels = [...agg.levels.entries()]
    .map(([k, v]) => ({ name: k, n: v.n, rejected: v.rj, rejRate: v.n ? v.rj / v.n : 0 }))
    .sort((a, b) => b.n - a.n);

  const approvals = [...agg.approvals.entries()]
    .map(([k, v]) => ({ name: k, n: v.n, approved: v.ap, rejected: v.rj, waiting: v.wt }))
    .sort((a, b) => b.n - a.n);

  // SLA buckets
  const buckets = [
    { name: "< 1 jam / hour", f: (h) => h < 1 },
    { name: "1 – 4 jam / hours", f: (h) => h >= 1 && h < 4 },
    { name: "4 – 8 jam / hours", f: (h) => h >= 4 && h < 8 },
    { name: "8 – 24 jam / hours", f: (h) => h >= 8 && h < 24 },
    { name: "1 – 3 hari / days", f: (h) => h >= 24 && h <= 72 },
    { name: "> 3 hari / days", f: (h) => h > 72 },
  ].map((b) => {
    const n = agg.hours.filter(b.f).length;
    return { name: b.name, n, share: total ? n / total : 0 };
  });

  const sla = {
    buckets,
    mean: agg.hours.length ? agg.hours.reduce((a, b) => a + b, 0) / agg.hours.length : null,
    min: agg.hours.length ? Math.min(...agg.hours) : null,
    max: agg.hours.length ? Math.max(...agg.hours) : null,
  };

  const topLocations = [...agg.locations.entries()]
    .map(([k, n]) => ({ name: k, n }))
    .sort((a, b) => b.n - a.n)
    .slice(0, 10);

  const topApprovers = [...agg.approvers.entries()]
    .map(([k, n]) => ({ name: k, n }))
    .sort((a, b) => b.n - a.n)
    .slice(0, 10);

  return {
    total, approved: agg.approved, rejected: agg.rejected, waiting: agg.waiting, cancelled: agg.cancelled,
    approvalRate: total ? agg.approved / total : 0,
    rejectionRate: total ? agg.rejected / total : 0,
    pendingRate: total ? agg.waiting / total : 0,
    companies, types, regions, empStatus, levels, approvals, sla, topLocations, topApprovers,
  };
}

/* ============================================================
   PDF EXPORT — native jsPDF, seluruh konten atas→bawah,
   otomatis multi-halaman A4 (bukan window.print)
   ============================================================ */
const loadJsPdf = () =>
  new Promise((resolve, reject) => {
    if (window.jspdf?.jsPDF) return resolve(window.jspdf.jsPDF);
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.crossOrigin = "anonymous";
    s.onload = () => (window.jspdf?.jsPDF ? resolve(window.jspdf.jsPDF) : reject(new Error("jsPDF tidak termuat")));
    s.onerror = () => reject(new Error("Gagal memuat library PDF — cek koneksi lalu coba lagi"));
    document.head.appendChild(s);
  });

async function exportPdf(rep, periodLabel, fileName) {
  const jsPDF = await loadJsPdf();
  const doc = new jsPDF({ unit: "mm", format: "a4", orientation: "portrait" });
  const W = 210, M = 14, CW = W - M * 2; // page, margin, content width
  let y = 0;
  const IND = [237, 6, 119], INK = [17, 24, 39], SUB = [107, 114, 128],
        GRN = [22, 163, 74], RED = [220, 38, 38], AMB = [217, 119, 6],
        LINE = [229, 231, 235], SOFT = [253, 230, 240];

  const newPage = () => { doc.addPage(); y = M; pageFooter(); };
  const ensure = (h) => { if (y + h > 283) newPage(); };
  const pageFooter = () => {
    doc.setFontSize(7.5); doc.setTextColor(...SUB);
    doc.text(`HCaja Leave Report · ${periodLabel}`, M, 292);
    doc.text(String(doc.internal.getNumberOfPages()), W - M, 292, { align: "right" });
  };

  /* ---- cover header ---- */
  doc.setFillColor(...IND); doc.rect(0, 0, W, 42, "F");
  try {
    doc.addImage(LOGO_HCAJA, "PNG", W - M - 26, 8, 26, 15.2);
  } catch (e) { /* logo optional, never block export */ }
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(9); doc.text("HCIS · PT TRI ADI BERSAMA (ANTERAJA)", M, 14);
  doc.setFontSize(20); doc.setFont("helvetica", "bold");
  doc.text("HCaja Leave Report", M, 25);
  doc.setFontSize(10); doc.setFont("helvetica", "normal");
  doc.text(`Periode / Period: ${periodLabel}`, M, 33);
  doc.setFontSize(8); doc.text(`Sumber / Source: ${fileName}`, M, 38.5);
  y = 50; pageFooter();

  /* ---- KPI row ---- */
  const kpi = (x, label, val, col) => {
    doc.setFillColor(...SOFT); doc.roundedRect(x, y, (CW - 8) / 3, 20, 2, 2, "F");
    doc.setFontSize(7.5); doc.setTextColor(...SUB); doc.text(label, x + 4, y + 6);
    doc.setFontSize(15); doc.setTextColor(...col); doc.setFont("helvetica", "bold");
    doc.text(String(val), x + 4, y + 15); doc.setFont("helvetica", "normal");
  };
  kpi(M, "Total Pengajuan / Requests", num(rep.total), INK);
  kpi(M + (CW - 8) / 3 + 4, "Approval Rate", pct(rep.approvalRate), GRN);
  kpi(M + 2 * ((CW - 8) / 3 + 4), "Rejection Rate", pct(rep.rejectionRate), RED);
  y += 28;

  const sectionTitle = (no, id, en) => {
    ensure(14);
    doc.setFillColor(...IND); doc.circle(M + 3, y + 3, 3, "F");
    doc.setFontSize(8); doc.setTextColor(255, 255, 255); doc.text(no, M + 3, y + 4.2, { align: "center" });
    doc.setFontSize(12); doc.setTextColor(...INK); doc.setFont("helvetica", "bold");
    doc.text(id, M + 9, y + 4.5); doc.setFont("helvetica", "normal");
    doc.setFontSize(8.5); doc.setTextColor(...SUB); doc.text(en, M + 9, y + 9);
    y += 13;
  };

  const tableRow = (cols, widths, opts = {}) => {
    ensure(7);
    let x = M;
    doc.setFontSize(opts.head ? 8 : 8.5);
    if (opts.head) { doc.setFillColor(...LINE); doc.rect(M, y - 4, CW, 6, "F"); doc.setTextColor(...SUB); doc.setFont("helvetica", "bold"); }
    else { doc.setTextColor(...(opts.color || INK)); if (opts.bold) doc.setFont("helvetica", "bold"); }
    cols.forEach((c, i) => {
      const w = widths[i];
      const align = i === 0 ? "left" : "right";
      const tx = align === "left" ? x + 1 : x + w - 1;
      doc.text(String(c ?? "—"), tx, y, { align, maxWidth: w - 2 });
      x += w;
    });
    doc.setFont("helvetica", "normal");
    y += opts.head ? 7 : 6;
  };

  const barRow = (label, n, max, extra, col = IND) => {
    ensure(8);
    doc.setFontSize(8.5); doc.setTextColor(...INK);
    doc.text(String(label), M + 1, y, { maxWidth: 55 });
    const bx = M + 58, bw = CW - 58 - 30;
    doc.setFillColor(...LINE); doc.roundedRect(bx, y - 3.2, bw, 4, 1, 1, "F");
    doc.setFillColor(...col); doc.roundedRect(bx, y - 3.2, Math.max(2, bw * Math.min(1, n / max)), 4, 1, 1, "F");
    doc.setTextColor(...SUB); doc.text(extra, M + CW, y, { align: "right" });
    y += 7;
  };

  /* 01 Executive Summary */
  sectionTitle("01", "Ringkasan Eksekutif", "Executive Summary");
  tableRow(["Status", "Jumlah / Count", "Persentase / Share"], [90, 46, 46], { head: true });
  tableRow(["Approved", num(rep.approved), pct(rep.total ? rep.approved / rep.total : 0)], [90, 46, 46], { color: GRN, bold: true });
  tableRow(["Reject", num(rep.rejected), pct(rep.total ? rep.rejected / rep.total : 0)], [90, 46, 46], { color: RED });
  tableRow(["Waiting Approval", num(rep.waiting), pct(rep.total ? rep.waiting / rep.total : 0)], [90, 46, 46], { color: AMB });
  tableRow(["Cancelled", num(rep.cancelled), pct(rep.total ? rep.cancelled / rep.total : 0)], [90, 46, 46]);
  y += 4;

  /* 02 By Company */
  sectionTitle("02", "Berdasarkan Perusahaan", "By Company");
  tableRow(["Company", "Total", "Approved", "Rejected", "Waiting", "Appr. Rate", "Avg Hour"], [40, 24, 26, 26, 24, 24, 18], { head: true });
  rep.companies.forEach((c) =>
    tableRow([c.name, num(c.n), num(c.approved), num(c.rejected), num(c.waiting), pct(c.rate), c.avgHour == null ? "—" : c.avgHour.toFixed(1)], [40, 24, 26, 26, 24, 24, 18]));
  y += 4;

  /* 03 By Leave Type */
  sectionTitle("03", "Berdasarkan Jenis Cuti", "By Leave Type");
  { const mx = rep.types[0]?.n || 1;
    rep.types.forEach((t) => barRow(t.name, t.n, mx, `${num(t.n)}  (${pct(t.share)})`)); }
  y += 4;

  /* 04 By Region */
  sectionTitle("04", "Berdasarkan Region", "By Region");
  { const mx = rep.regions[0]?.n || 1;
    rep.regions.forEach((r) => barRow(r.name, r.n, mx, `${num(r.n)}  ·  appr ${pct(r.rate)}`)); }
  y += 4;

  /* 05 By Employment Status */
  sectionTitle("05", "Berdasarkan Status Kepegawaian", "By Employment Status");
  tableRow(["Status", "Total", "Rejected", "Rejection Rate"], [80, 34, 34, 34], { head: true });
  rep.empStatus.forEach((e) =>
    tableRow([e.name, num(e.n), num(e.rejected), pct(e.rejRate)], [80, 34, 34, 34]));
  y += 4;

  /* 06 By Level */
  sectionTitle("06", "Berdasarkan Level Jabatan", "By Level Code");
  { const mx = rep.levels[0]?.n || 1;
    rep.levels.forEach((l) => barRow(l.name, l.n, mx, `${num(l.n)}  ·  rej ${pct(l.rejRate)}`, [30, 41, 59])); }
  y += 4;

  /* 07 By Approval Type */
  sectionTitle("07", "Berdasarkan Tipe Persetujuan", "By Approval Type");
  tableRow(["Approval Type", "Total", "Approved", "Rejected", "Waiting"], [70, 28, 28, 28, 28], { head: true });
  rep.approvals.forEach((a) =>
    tableRow([a.name, num(a.n), num(a.approved), num(a.rejected), num(a.waiting)], [70, 28, 28, 28, 28]));
  y += 4;

  /* 08 SLA */
  sectionTitle("08", "SLA & Waktu Proses", "SLA & Processing Time");
  tableRow(["Rata-rata / Mean", rep.sla.mean == null ? "—" : rep.sla.mean.toFixed(1) + " jam/hours", ""], [90, 62, 30], { bold: true });
  tableRow(["Minimum", rep.sla.min == null ? "—" : rep.sla.min + " h", ""], [90, 62, 30]);
  tableRow(["Maksimum / Max", rep.sla.max == null ? "—" : rep.sla.max + " h", ""], [90, 62, 30]);
  y += 2;
  { const mx = Math.max(...rep.sla.buckets.map((b) => b.n), 1);
    rep.sla.buckets.forEach((b) => barRow(b.name, b.n, mx, `${num(b.n)}  (${pct(b.share)})`)); }
  y += 4;

  /* 09 Top 10 Locations */
  sectionTitle("09", "10 Lokasi Teratas", "Top 10 Locations by Requests");
  { const mx = rep.topLocations[0]?.n || 1;
    rep.topLocations.forEach((l, i) => barRow(`${i + 1}. ${l.name}`, l.n, mx, num(l.n))); }

  doc.save(`HCaja_Leave_Report_${periodLabel.replace(/[^0-9A-Za-z]+/g, "_")}.pdf`);
}

   PptxGenJS tidak tersedia di cdnjs, maka deck dirakit manual)
   ============================================================ */
const loadJSZip = () =>
  new Promise((resolve, reject) => {
    if (window.JSZip) return resolve(window.JSZip);
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
    s.crossOrigin = "anonymous";
    s.onload = () => (window.JSZip ? resolve(window.JSZip) : reject(new Error("JSZip tidak termuat")));
    s.onerror = () => reject(new Error("Gagal memuat library PPTX (JSZip) — cek koneksi lalu coba lagi"));
    document.head.appendChild(s);
  });

/* --- helper EMU (1 inch = 914400) — kanvas 16:9 = 13.333 x 7.5 in --- */
const EMU = 914400;
const emu = (inch) => Math.round(inch * EMU);
const xesc = (t) =>
  String(t ?? "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&apos;");

let __spId = 1;
const spText = (text, x, y, w, h, o = {}) => {
  const size = Math.round((o.size || 12) * 100);
  const color = o.color || "0F172A";
  const bold = o.bold ? ' b="1"' : "";
  const align = o.align ? ` algn="${o.align === "right" ? "r" : o.align === "center" ? "ctr" : "l"}"` : "";
  const lines = String(text).split("\n");
  const paras = lines
    .map(
      (ln) =>
        `<a:p><a:pPr${align}/><a:r><a:rPr lang="id-ID" sz="${size}"${bold} dirty="0"><a:solidFill><a:srgbClr val="${color}"/></a:solidFill></a:rPr><a:t>${xesc(ln)}</a:t></a:r></a:p>`
    )
    .join("");
  return `<p:sp><p:nvSpPr><p:cNvPr id="${++__spId}" name="t${__spId}"/><p:cNvSpPr txBox="1"/><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="${emu(x)}" y="${emu(y)}"/><a:ext cx="${emu(w)}" cy="${emu(h)}"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom><a:noFill/></p:spPr><p:txBody><a:bodyPr wrap="square" lIns="0" tIns="0" rIns="0" bIns="0"><a:normAutofit/></a:bodyPr><a:lstStyle/>${paras}</p:txBody></p:sp>`;
};

const spRect = (x, y, w, h, color, rounded = true) =>
  `<p:sp><p:nvSpPr><p:cNvPr id="${++__spId}" name="r${__spId}"/><p:cNvSpPr/><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="${emu(x)}" y="${emu(y)}"/><a:ext cx="${emu(w)}" cy="${emu(h)}"/></a:xfrm><a:prstGeom prst="${rounded ? "roundRect" : "rect"}"><a:avLst${rounded ? '><a:gd name="adj" fmla="val 25000"/></a:avLst' : "/"}></a:prstGeom><a:solidFill><a:srgbClr val="${color}"/></a:solidFill><a:ln><a:noFill/></a:ln></p:spPr><p:txBody><a:bodyPr/><a:lstStyle/><a:p/></p:txBody></p:sp>`;

const slideXml = (shapes) =>
  `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<p:sld xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main"><p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/><a:chOff x="0" y="0"/><a:chExt cx="0" cy="0"/></a:xfrm></p:grpSpPr>${shapes.join("")}</p:spTree></p:cSld><p:clrMapOvr><a:overrideClrMapping bg1="lt1" tx1="dk1" bg2="lt2" tx2="dk2" accent1="accent1" accent2="accent2" accent3="accent3" accent4="accent4" accent5="accent5" accent6="accent6" hlink="hlink" folHlink="folHlink"/></p:clrMapOvr></p:sld>`;

async function exportPptx(rep, periodLabel, fileName) {
  const JSZip = await loadJSZip();
  __spId = 1;

  const IND = "ED0677", INK = "111827", SUB = "6B7280", GRN = "16A34A",
    RED = "DC2626", AMB = "D97706", LNE = "E5E7EB", SOFT = "FDE6F0", WHT = "FFFFFF";

  const W = 13.333, M = 0.5, CW = W - M * 2;
  const slides = [];

  const footerShape = () =>
    spText(`HCaja Leave Report   |   ${periodLabel}`, M, 7.08, 10, 0.3, { size: 9, color: "9CA3AF" });

  const headerShapes = (no, id, en) => [

  ];

  const bar = (x, y, w, h, frac, color) => [
    spRect(x, y, w, h, LNE),
    spRect(x, y, Math.max(0.08, w * Math.min(1, Math.max(0, frac))), h, color),
  ];

  /* --- Slide 1: COVER --- */
  {
    const sh = [
      spRect(0, 0, W, 7.5, IND, false),
      spText("HCIS · PT TRI ADI BERSAMA (ANTERAJA)", M, 1.1, 10, 0.35, { size: 12, color: "FBCFE3" }),

    ];
    const kpis = [
      ["Total Pengajuan / Requests", num(rep.total), WHT],
      ["Approval Rate", pct(rep.approvalRate), "6EE7B7"],
      ["Rejection Rate", pct(rep.rejectionRate), "FDA4AF"],
    ];
    kpis.forEach(([lb, vl, cl], i) => {
      const x = M + i * 4.2;
      sh.push(spRect(x, 4.2, 3.9, 1.7, "C81E68"));

/* ---------- main app ---------- */
function LeaveReportScroll() {
  const [rows, setRows] = useState(null);
  const [fileName, setFileName] = useState("");
  const [error, setError] = useState("");
  const [start, setStart] = useState(null);
  const [end, setEnd] = useState(null);
  const [busy, setBusy] = useState(false);
  const [initLoading, setInitLoading] = useState(true);
  const [fetchedAt, setFetchedAt] = useState(null);

  const applyRows = useCallback((data, label) => {
    if (!data.length) return false;
    const dates = data.map((r) => r._date).filter(Boolean);
    setRows(data);
    setFileName(label);
    if (dates.length) {
      let minDate = dates[0], maxDate = dates[0];
      for (let i = 1; i < dates.length; i++) {
        if (dates[i] < minDate) minDate = dates[i];
        if (dates[i] > maxDate) maxDate = dates[i];
      }
      setStart(minDate);
      setEnd(maxDate);
    }
    return true;
  }, []);

  const loadFromSheet = useCallback(async (isRefresh) => {
    setError("");
    if (isRefresh) setBusy(true);
    try {
      const raw = await fetchSheetRows(GOOGLE_SHEET_CSV_URL);
      const data = processRawRows(raw);
      if (!data.length) {
        setError(
          'Google Sheet tidak berisi baris dengan kolom "Register No". Pastikan nama kolom sama seperti export HCaja. / No rows found with a "Register No" column — check the sheet still has the same column headers as the HCaja export.'
        );
        return;
      }
      applyRows(data, "Google Sheets — HCaja Leave Data");
      setFetchedAt(new Date());
    } catch (e) {
      setError(
        "Gagal mengambil data dari Google Sheets / Failed to fetch Google Sheets data: " +
          e.message +
          ". Pastikan sheet sudah di-publish ke web (File → Share → Publish to web → CSV)."
      );
    } finally {
      setInitLoading(false);
      setBusy(false);
    }
  }, [applyRows]);

  /* fetch live data from Google Sheets on first load */
  useEffect(() => {
    loadFromSheet(false);
  }, [loadFromSheet]);

  const rep = useMemo(() => {
    if (!rows || !start || !end) return null;
    const endIncl = new Date(end);
    endIncl.setHours(23, 59, 59, 999);
    return buildReport(rows, start, endIncl);
  }, [rows, start, end]);

  const periodLabel = start && end ? `${fmtDate(start)} – ${fmtDate(end)}` : "";

  const onPptx = async () => {
    if (!rep || busy) return;
    setBusy(true);
    setError("");
    try {
      await exportPptx(rep, periodLabel, fileName);
    } catch (e) {
      setError("Export PPTX gagal / failed: " + e.message);
    } finally {
      setBusy(false);
    }
  };

  const onPdf = async () => {
    if (!rep || busy) return;
    setBusy(true);
    setError("");
    try {
      await exportPdf(rep, periodLabel, fileName);
    } catch (e) {
      setError("Export PDF gagal / failed: " + e.message);
    } finally {
      setBusy(false);
    }
  };

  const btnStyle = (variant = "primary") => ({
    background: variant === "primary" ? C.primary : "#FFFFFF",
    color: variant === "primary" ? "#fff" : C.secondary,
    border: variant === "primary" ? "none" : `1px solid ${C.line}`,
    borderRadius: 12, height: 40, padding: "0 16px", fontSize: 13, fontWeight: 500,
    cursor: "pointer", opacity: busy ? 0.6 : 1, fontFamily: FONT,
  });

  /* ---- checking storage: skeleton loading, not spinner-only ---- */
  if (initLoading) {
    return (
      <div style={{ minHeight: "100vh", background: C.bg, fontFamily: FONT, padding: "20px clamp(10px,3vw,20px)" }}>
        <style>{`@keyframes skeletonPulse{0%,100%{opacity:1}50%{opacity:.45}}`}</style>
        <div style={{ maxWidth: 980, margin: "0 auto", display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ height: 96, borderRadius: 16, background: "#F1F5F9", animation: "skeletonPulse 1.3s ease-in-out infinite" }} />
          {[1, 2, 3].map((i) => (
            <div key={i} style={{ height: 140, borderRadius: 16, background: "#F1F5F9", animation: "skeletonPulse 1.3s ease-in-out infinite", animationDelay: `${i * 0.12}s` }} />
          ))}
        </div>
      </div>
    );
  }

  /* ---- info screen (hanya jika data tertanam kosong — seharusnya tidak terjadi) ---- */
  if (!rows) {
    return (
      <div
        style={{
          minHeight: "100vh", background: C.bg, display: "flex",
          alignItems: "center", justifyContent: "center",
          fontFamily: FONT, padding: 20,
        }}
      >
        <div style={{ maxWidth: 480, width: "100%", textAlign: "center" }}>
          <div
            style={{
              width: 56, height: 56, borderRadius: 16, background: C.primarySoft,
              display: "flex", alignItems: "center", justifyContent: "center",
              margin: "0 auto 16px", fontSize: 24,
            }}
          >
            📋
          </div>
          <div style={{ fontSize: 11, letterSpacing: 2, color: C.primary, fontWeight: 700 }}>
            HCIS · ANTERAJA
          </div>
          <h1 style={{ color: C.ink, fontSize: "clamp(20px, 5vw, 26px)", fontWeight: 600, margin: "10px 0 6px" }}>
            HCaja Leave Report
          </h1>
          <p style={{ color: C.sub, fontSize: 13.5, lineHeight: 1.5 }}>
            Data belum berhasil dimuat dari Google Sheets. Cek URL sheet yang di-publish atau koneksi internet, lalu coba lagi.
            <br />
            Data hasn't loaded from Google Sheets yet — check the published sheet URL or your connection, then retry.
          </p>
          <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 14, flexWrap: "wrap" }}>
            <button onClick={() => { setInitLoading(true); loadFromSheet(false); }} style={btnStyle("primary")}>
              ↻ Coba lagi / Retry
            </button>
          </div>
          {error && (
            <div
              style={{
                marginTop: 16, background: C.redSoft, color: C.red,
                borderRadius: 10, padding: "10px 14px", fontSize: 12.5, textAlign: "left",
                border: `1px solid #FECACA`,
              }}
            >
              {error}
            </div>
          )}
        </div>
      </div>
    );
  }

  const maxLoc = rep.topLocations[0]?.n || 1;
  const maxApr = rep.topApprovers[0]?.n || 1;
  const maxLvl = rep.levels[0]?.n || 1;
  const maxBucket = Math.max(...rep.sla.buckets.map((b) => b.n), 1);

  /* ---- single-scroll report ---- */
  return (
    <div
      className="app-root"
      style={{
        minHeight: "100vh", background: C.bg,
        fontFamily: FONT, paddingBottom: 40,
      }}
    >
      <style>{`
        @media print {
          * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
          .no-print { display: none !important; }
          body, .app-root { background: #ffffff !important; padding-bottom: 0 !important; margin: 0; padding: 0; }
          .print-section { box-shadow: none !important; border: 1px solid #E2E8F0; break-inside: avoid; page-break-inside: avoid; margin-bottom: 12px; }
          .print-hero { break-inside: avoid; page-break-inside: avoid; margin-bottom: 16px; }
          table { border-collapse: collapse; width: 100%; }
          th, td { border: 1px solid #E2E8F0; padding: 6px 8px; }
          @page { margin: 10mm; size: A4; }
        }
      `}</style>

      {/* sticky control bar */}
      <div
        className="no-print"
        style={{
          position: "sticky", top: 0, zIndex: 10,
          background: "#FFFFFF",
          borderBottom: `1px solid ${C.line}`, padding: "12px 16px",
          display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap",
        }}
      >
        <img
          src={LOGO_HCAJA}
          alt="HCaja"
          style={{ height: 28, width: "auto", flexShrink: 0 }}
        />
        <div style={{ color: C.ink, fontWeight: 600, fontSize: 13.5, marginRight: "auto", minWidth: 150 }}>
          Leave Request Auto-Report
          <div style={{ color: C.sub, fontWeight: 400, fontSize: 10.5 }}>
            {fileName} · {num(rows.length)} baris / rows
            {fetchedAt && (
              <span style={{ color: C.green }}>
                {" "}· live dari Google Sheets, diambil {fmtDateTime(fetchedAt)}
              </span>
            )}
          </div>
        </div>
        <label style={{ color: C.secondary, fontSize: 11.5, display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
          Periode:
          <input
            type="date"
            value={toInputDate(start)}
            onChange={(e) => e.target.value && setStart(new Date(e.target.value))}
            style={{
              background: "#fff", color: C.ink, border: `1px solid ${C.line}`,
              borderRadius: 8, padding: "6px 8px", fontSize: 11.5, fontFamily: FONT,
            }}
          />
          –
          <input
            type="date"
            value={toInputDate(end)}
            onChange={(e) => e.target.value && setEnd(new Date(e.target.value))}
            style={{
              background: "#fff", color: C.ink, border: `1px solid ${C.line}`,
              borderRadius: 8, padding: "6px 8px", fontSize: 11.5, fontFamily: FONT,
            }}
          />
        </label>
        <button onClick={() => loadFromSheet(true)} disabled={busy} style={btnStyle("secondary")}>
          {busy ? "Memuat…" : "↻ Refresh"}
        </button>
        <button onClick={onPptx} disabled={busy} style={btnStyle("primary")}>
          {busy ? "Membuat PPTX…" : "⬇ PPTX Deck"}
        </button>
        <button onClick={onPdf} disabled={busy} style={btnStyle("secondary")}>
          {busy ? "Memproses…" : "⬇ PDF Report"}
        </button>
      </div>

      {error && (
        <div
          className="no-print"
          style={{
            margin: "12px 16px 0", background: C.redSoft, color: C.red,
            borderRadius: 10, padding: "8px 12px", fontSize: 12, border: "1px solid #FECACA",
          }}
        >
          {error}
        </div>
      )}

      <div
        style={{
          maxWidth: 980, margin: "0 auto",
          padding: "24px clamp(10px, 3vw, 20px)",
          display: "flex", flexDirection: "column", gap: 24,
        }}
      >
        {/* HERO / COVER — flat card, no gradient, per HCaja Design System */}
        <div
          className="print-hero"
          style={{
            background: C.card, borderRadius: 16, border: `1px solid ${C.line}`,
            boxShadow: SOFT_SHADOW, overflow: "hidden",
          }}
        >
          <div style={{ height: 4, background: C.primary }} />
          <div style={{ padding: "clamp(20px, 4.6vw, 32px) clamp(20px, 5vw, 36px)", textAlign: "center" }}>
            <img src={LOGO_HCAJA} alt="HCaja" style={{ height: 34, width: "auto" }} />
            <div style={{ fontSize: 10.5, letterSpacing: 1.5, color: C.sub, fontWeight: 600, marginTop: 6 }}>
              HCIS · PT TRI ADI BERSAMA (ANTERAJA)
            </div>
            <h1 style={{ margin: "14px 0 4px", fontSize: "clamp(22px, 5.5vw, 34px)", fontWeight: 700, color: C.ink }}>
              Laporan Pengajuan Cuti
            </h1>
            <div style={{ fontSize: "clamp(12px, 2.4vw, 15px)", color: C.sub }}>
              Leave Request Report — {periodLabel}
            </div>
            <div
              style={{
                display: "flex", justifyContent: "center",
                gap: "clamp(14px, 4vw, 36px)", marginTop: 22, flexWrap: "wrap",
              }}
            >
              {[
                { v: num(rep.total), l: "Total Pengajuan / Requests", c: C.ink },
                { v: pct(rep.approvalRate), l: "Approval Rate", c: C.green },
                { v: pct(rep.rejectionRate), l: "Rejection Rate", c: C.red },
              ].map((k) => (
                <div key={k.l}>
                  <div style={{ fontSize: "clamp(22px, 5vw, 32px)", fontWeight: 700, color: k.c }}>{k.v}</div>
                  <div style={{ fontSize: 10.5, color: C.sub }}>{k.l}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {rep.total === 0 ? (
          <Section no="!" id="Tidak ada data pada periode ini" en="No records in the selected period">
            <div style={{ fontSize: 13, color: C.sub }}>
              Sesuaikan rentang tanggal pada bar di atas. Adjust the date range in the bar above.
            </div>
          </Section>
        ) : (
          <>
            {/* 01 EXEC SUMMARY */}
            <Section no="01" id="Ringkasan Eksekutif" en="Executive Summary">
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 18 }}>
                <Kpi label="Total Pengajuan" en="Total Requests" value={num(rep.total)} />
                <Kpi label="Disetujui" en="Approved" value={num(rep.approved)} color={C.green} soft={C.greenSoft} />
                <Kpi label="Ditolak" en="Rejected" value={num(rep.rejected)} color={C.red} soft={C.redSoft} />
                <Kpi label="Menunggu" en="Waiting Approval" value={num(rep.waiting)} color={C.amber} soft={C.amberSoft} />
                <Kpi label="Dibatalkan" en="Cancelled" value={num(rep.cancelled)} color={C.gray} />
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {[
                  { l: "Approval Rate", v: rep.approvalRate, c: C.green },
                  { l: "Rejection Rate", v: rep.rejectionRate, c: C.red },
                  { l: "Pending Rate", v: rep.pendingRate, c: C.amber },
                ].map((r) => (
                  <div key={r.l} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 104, fontSize: 12, fontWeight: 600, color: C.ink }}>{r.l}</div>
                    <Bar value={r.v} max={1} color={r.c} height={16} />
                    <div style={{ width: 56, textAlign: "right", fontWeight: 700, fontSize: 13, color: r.c }}>
                      {pct(r.v)}
                    </div>
                  </div>
                ))}
              </div>
            </Section>

            {/* 02 BY COMPANY */}
            <Section no="02" id="Berdasarkan Perusahaan" en="By Company">
              <TableWrap>
                <thead>
                  <tr>
                    <Th>Company</Th>
                    <Th right>Total</Th>
                    <Th right>Approved</Th>
                    <Th right>Rejected</Th>
                    <Th right>Waiting</Th>
                    <Th right>Approval Rate</Th>
                    <Th right>Avg Hour</Th>
                  </tr>
                </thead>
                <tbody>
                  {rep.companies.map((c) => (
                    <tr key={c.name}>
                      <Td strong>{c.name}</Td>
                      <Td right strong>{num(c.n)}</Td>
                      <Td right color={C.green}>{num(c.approved)}</Td>
                      <Td right color={C.red}>{num(c.rejected)}</Td>
                      <Td right color={C.amber}>{num(c.waiting)}</Td>
                      <Td right strong>{pct(c.rate)}</Td>
                      <Td right>{c.avgHour == null ? "—" : c.avgHour.toFixed(1)}</Td>
                    </tr>
                  ))}
                </tbody>
              </TableWrap>
              <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 9 }}>
                {rep.companies.map((c) => (
                  <div key={c.name} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 48, fontSize: 12, fontWeight: 700, color: C.ink }}>{c.name}</div>
                    <Bar value={c.n} max={rep.companies[0]?.n || 1} />
                    <div style={{ width: 48, textAlign: "right", fontSize: 12, fontWeight: 600, color: C.ink }}>
                      {num(c.n)}
                    </div>
                  </div>
                ))}
              </div>
            </Section>

            {/* 03 BY LEAVE TYPE */}
            <Section no="03" id="Berdasarkan Jenis Cuti" en="By Leave Type">
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 18 }}>
                {rep.types.map((t, i) => (
                  <Kpi
                    key={t.name}
                    label={t.name}
                    en={pct(t.share) + " dari total / of total"}
                    value={num(t.n)}
                    color={i === 0 ? C.indigo : C.slateHead}
                    soft={i === 0 ? C.indigoSoft : undefined}
                  />
                ))}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {rep.types.map((t, i) => (
                  <div key={t.name} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 76, fontSize: 12, fontWeight: 700, color: C.ink }}>{t.name}</div>
                    <Bar value={t.n} max={rep.types[0]?.n || 1} color={i === 0 ? C.indigo : C.gray} height={18} />
                    <div style={{ width: 96, textAlign: "right", fontSize: 12, color: C.ink }}>
                      <b>{num(t.n)}</b> <span style={{ color: C.sub }}>({pct(t.share)})</span>
                    </div>
                  </div>
                ))}
              </div>
            </Section>

            {/* 04 BY REGION */}
            <Section no="04" id="Berdasarkan Region" en="By Region" accent={C.magenta} accentSoft={C.magentaSoft}>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {rep.regions.map((r) => (
                  <div key={r.name} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 120, fontSize: 12, fontWeight: 700, color: C.ink }}>{r.name}</div>
                    <Bar value={r.n} max={rep.regions[0]?.n || 1} color={C.magenta} />
                    <div style={{ width: 96, textAlign: "right", fontSize: 12, color: C.ink }}>
                      <b>{num(r.n)}</b> | <span style={{ color: C.green, fontWeight: 700 }}>{pct(r.rate)}</span>
                    </div>
                  </div>
                ))}
              </div>
            </Section>

            {/* 05 EMPLOYMENT STATUS */}
            <Section no="05" id="Berdasarkan Status Kepegawaian" en="By Employment Status">
              <TableWrap>
                <thead>
                  <tr>
                    <Th>Status</Th>
                    <Th right>Count</Th>
                    <Th right>Rejected</Th>
                    <Th right>Rejection Rate</Th>
                  </tr>
                </thead>
                <tbody>
                  {rep.empStatus.map((e) => (
                    <tr key={e.name}>
                      <Td strong>{e.name}</Td>
                      <Td right>{num(e.n)}</Td>
                      <Td right color={C.red}>{num(e.rejected)}</Td>
                      <Td right strong color={C.red}>{pct(e.rejRate)}</Td>
                    </tr>
                  ))}
                </tbody>
              </TableWrap>
              <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 10 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, letterSpacing: 0.5 }}>
                  REJECTION RATE COMPARISON
                </div>
                {rep.empStatus.map((e) => (
                  <div key={e.name} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 76, fontSize: 12, fontWeight: 700, color: C.ink }}>{e.name}</div>
                    <Bar value={e.rejRate} max={1} color={C.red} height={16} />
                    <div style={{ width: 56, textAlign: "right", fontWeight: 700, fontSize: 12.5, color: C.red }}>
                      {pct(e.rejRate)}
                    </div>
                  </div>
                ))}
              </div>
            </Section>

            {/* 05 BY LEVEL */}
            <Section no="06" id="Berdasarkan Level Jabatan" en="By Level Code" accent={C.orange} accentSoft={C.orangeSoft}>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <div style={{ display: "flex", gap: 10, fontSize: 10.5, fontWeight: 700, color: C.sub }}>
                  <div style={{ width: 64 }}>LEVEL</div>
                  <div style={{ flex: 1 }}>REQUESTS</div>
                  <div style={{ width: 52, textAlign: "right" }}>Total</div>
                  <div style={{ width: 74, textAlign: "right" }}>REJ. RATE</div>
                </div>
                {rep.levels.map((l) => (
                  <div key={l.name} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 64, fontSize: 12, fontWeight: 700, color: C.ink }}>{l.name}</div>
                    <Bar value={l.n} max={maxLvl} color={C.orange} />
                    <div style={{ width: 52, textAlign: "right", fontSize: 12, fontWeight: 600, color: C.ink }}>
                      {num(l.n)}
                    </div>
                    <div
                      style={{
                        width: 74, textAlign: "right", fontSize: 12, fontWeight: 700,
                        color: l.rejRate >= 0.4 ? C.red : l.rejRate >= 0.2 ? C.amber : C.green,
                      }}
                    >
                      {pct(l.rejRate)}
                    </div>
                  </div>
                ))}
              </div>
            </Section>

            {/* 06 BY APPROVAL TYPE */}
            <Section no="07" id="Berdasarkan Tipe Persetujuan" en="By Approval Type">
              <TableWrap>
                <thead>
                  <tr>
                    <Th>Approval Type</Th>
                    <Th right>Total</Th>
                    <Th right>Approved</Th>
                    <Th right>Rejected</Th>
                    <Th right>Waiting</Th>
                  </tr>
                </thead>
                <tbody>
                  {rep.approvals.map((a) => (
                    <tr key={a.name}>
                      <Td strong>{a.name}</Td>
                      <Td right strong>{num(a.n)}</Td>
                      <Td right color={C.green}>{num(a.approved)}</Td>
                      <Td right color={C.red}>{num(a.rejected)}</Td>
                      <Td right color={C.amber}>{num(a.waiting)}</Td>
                    </tr>
                  ))}
                </tbody>
              </TableWrap>
              <div
                style={{
                  marginTop: 14, background: C.amberSoft, border: "1px solid #FDE68A",
                  borderRadius: 10, padding: "10px 14px", fontSize: 12, color: "#92400E",
                }}
              >
                <b>Catatan / Note:</b> perhatikan tipe persetujuan dengan rejected tinggi dan approved
                nol — indikasi auto-decision di level workflow (mis. Level Position SO). Review
                approval types with high rejection and zero approval as potential workflow
                auto-decision points.
              </div>
            </Section>

            {/* 07 SLA */}
            <Section no="08" id="SLA & Waktu Proses" en="SLA & Processing Time">
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 18 }}>
                <Kpi label="Rata-rata" en="Mean Process Hour" value={rep.sla.mean == null ? "—" : rep.sla.mean.toFixed(1) + " h"} color={C.indigo} soft={C.indigoSoft} />
                <Kpi label="Minimum" en="Min Process Hour" value={rep.sla.min == null ? "—" : rep.sla.min + " h"} color={C.green} />
                <Kpi label="Maksimum" en="Max Process Hour" value={rep.sla.max == null ? "—" : rep.sla.max + " h"} color={C.red} />
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
                {rep.sla.buckets.map((b) => (
                  <div key={b.name} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 118, fontSize: 12, fontWeight: 600, color: C.ink }}>{b.name}</div>
                    <Bar value={b.n} max={maxBucket} />
                    <div style={{ width: 104, textAlign: "right", fontSize: 12, color: C.ink }}>
                      <b>{num(b.n)}</b> <span style={{ color: C.sub }}>({pct(b.share)})</span>
                    </div>
                  </div>
                ))}
              </div>
            </Section>

            {/* 08 TOP LOCATIONS */}
            <Section no="09" id="10 Lokasi Teratas" en="Top 10 Locations by Requests" accent={C.magenta} accentSoft={C.magentaSoft}>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {rep.topLocations.map((l, i) => (
                  <RankRow key={l.name} rank={i + 1} name={l.name} n={l.n} max={maxLoc} color={C.magenta} />
                ))}
              </div>
            </Section>
          </>
        )}

        <div
          style={{
            display: "flex", flexDirection: "column", alignItems: "center", gap: 10,
            padding: "20px 0 4px",
          }}
        >
          <div style={{ fontSize: 10, letterSpacing: 1.5, color: C.disabled, fontWeight: 600 }}>
            APLIKASI & PENYEDIA DATA / APP &amp; DATA SOURCE
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 28, flexWrap: "wrap", justifyContent: "center" }}>
            <img src={LOGO_HCAJA} alt="HCaja" style={{ height: 22, width: "auto", opacity: 0.85 }} />
            <img src={LOGO_ANTERAJA} alt="Anteraja" style={{ height: 20, width: "auto", opacity: 0.85 }} />
            <img src={LOGO_TITIPAJA} alt="Titipaja" style={{ height: 18, width: "auto", opacity: 0.85 }} />
          </div>
        </div>

        <div style={{ textAlign: "center", fontSize: 10.5, color: C.sub, letterSpacing: 0.5, fontFamily: FONT }}>
          HCaja Leave Report · Sumber / Source: {fileName} · {periodLabel}
        </div>
      </div>
    </div>
  );
}

/* ---------- mount ---------- */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<LeaveReportScroll />);
</script>
</body>
</html>
